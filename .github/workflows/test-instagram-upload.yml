name: Test Instagram Upload (manual)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "GitHub Release tag containing the video asset (e.g., v20260425)"
        required: true
      asset_name:
        description: "Asset filename in the release (e.g., coffee-20260425.mp4)"
        required: true

permissions:
  contents: read

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Download video asset
        run: |
          mkdir -p output
          gh release download "${{ inputs.release_tag }}" \
            -p "${{ inputs.asset_name }}" \
            -D output/
          ls -la "output/${{ inputs.asset_name }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate captions
        run: |
          node scripts/scrape-coffee-news.mjs
          node scripts/generate-data.mjs
          node scripts/generate-caption.mjs
        env:
          TZ: Asia/Tokyo

      - name: Upload to Instagram (resumable)
        run: node scripts/upload-instagram.mjs --file="output/${{ inputs.asset_name }}"
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
